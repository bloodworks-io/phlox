[project]
name = "phlox-server"
version = "0.7.1"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.13.3",
    "APScheduler>=3.10.4",
    "attr>=0.3.2",
    "fastapi>=0.115.8",
    "feedparser>=6.0.11",
    "fuzzywuzzy>=0.18.0",
    "httptools>=0.7.1",
    "httpx>=0.28.1",
    "icalendar>=5.0.13",
    "json-repair>=0.55.0",
    "numpy>=2.4.1",
    "ollama>=0.4.7",
    "openai>=1.76.2",
    "Pillow>=12.1.1",
    "platformdirs>=4.3.8",
    "pydantic>=2.10.6",
    "python-dotenv>=1.0.1",
    "python-Levenshtein>=0.25.1",
    "python-multipart>=0.0.22",
    "sqlcipher3>=0.6.2",
    "tiktoken>=0.7.0",
    "urllib3>=2.6.3",
    "uvicorn>=0.34.0",
]

[project.optional-dependencies]
rag = [
    "chromadb>=0.6.3",
    "PyMuPDF>=1.24.9",
    "pytesseract>=0.3.13",
]
docker = [
    "phlox-server[rag]",
]
dev = [
    "pytest>=8.3.4",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "bandit[toml]>=1.8.3",
    "pre-commit>=4.0.0",
]

[dependency-groups]
dev = [
    "nuitka>=2.0.0",
    "pytest>=8.3.4",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "bandit[toml]>=1.8.3",
    "pre-commit>=4.0.0",
]

[tool.setuptools]
py-modules = []

[tool.hatch.build.targets.wheel]
packages = []

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "ARG", "PTH", "SIM", "TCH"]
ignore = ["E501", "B008", "UP007", "SIM108"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "server.*"
disallow_untyped_defs = false
warn_return_any = false

[tool.bandit]
exclude_dirs = ["tests", ".venv", "dist"]
