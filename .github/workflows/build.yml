name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: "macos-latest"
            arch: "aarch64"
            os: "darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout whisper.cpp
        run: |
          git clone --depth 1 --branch v1.8.3 https://github.com/ggerganov/whisper.cpp.git src-tauri/whisper.cpp
          rm -rf src-tauri/whisper.cpp/.git

      - name: Checkout llama.cpp
        run: |
          git clone --depth 1 --branch b8095 https://github.com/ggerganov/llama.cpp.git src-tauri/llama.cpp
          rm -rf src-tauri/llama.cpp/.git

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "❌ APPLE_CERTIFICATE secret is not set"
            exit 1
          fi
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "❌ APPLE_CERTIFICATE_PASSWORD secret is not set"
            exit 1
          fi
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "❌ APPLE_SIGNING_IDENTITY secret is not set"
            exit 1
          fi

          # Generate and mask keychain password
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm -f certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Verify the identity is actually present before we waste time compiling
          if ! security find-identity -v -p codesigning build.keychain | grep -q "$APPLE_SIGNING_IDENTITY"; then
            echo "❌ Signing identity '$APPLE_SIGNING_IDENTITY' not found in keychain after import"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          echo "✅ Certificate imported and signing identity verified"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: aarch64-apple-darwin

      - name: Install Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python and uv
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install ccache
        run: brew install ccache

      - name: Cache Nuitka and ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/Library/Caches/Nuitka
            ~/.cache/ccache
          key: nuitka-ccache-${{ runner.os }}-${{ hashFiles('server/**/*.py', 'server/uv.lock') }}
          restore-keys: |
            nuitka-ccache-${{ runner.os }}-

      - name: Set up Python venv with uv
        run: |
          cd server
          ~/.local/bin/uv sync
          ~/.local/bin/uv pip install nuitka

      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          npm ci
          cd ..

      - name: Build all components
        env:
          # Pass to build scripts for signing binaries
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: ./build-all.sh

      - name: Build and notarize Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd src-tauri
          npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: Phlox-${{ matrix.os }}-${{ matrix.arch }}
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
